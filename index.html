<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32-CAM · Elaina Controller</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:  #b48ef0;
      --accent2: #7ec8e3;
      --gold:    #f0c060;
      --danger:  #e06080;
      --success: #80e0b0;
      --warn:    #f0b060;
      --text:    #e8d8f8;
      --muted:   #6b4fa0;
      --border:  #3d2a6e;
      --panel:   rgba(13,8,24,0.82);
      --font-title: 'Cinzel', serif;
      --font-ui:    'Nunito', sans-serif;
      --font-mono:  'Share Tech Mono', monospace;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      background: #08050f;
    }

    /* ── FULL BG: Elaina images ── */
    #bgWrap {
      position: fixed; inset: 0; z-index: 0;
    }
    .bg-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      transition: opacity 1.2s ease;
    }
    #bgImg1 { opacity: 1; animation: elainaFloat 6s ease-in-out infinite; }
    #bgImg2 { opacity: 0; animation: elainaFloat 6s ease-in-out infinite 1s; }
    @keyframes elainaFloat {
      0%,100% { transform: scale(1.03) translateY(0px); }
      50%      { transform: scale(1.06) translateY(-14px); }
    }

    /* Overlays */
    .bg-vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(8,5,15,0.75) 100%),
        linear-gradient(to top, rgba(8,5,15,0.9) 0%, transparent 40%),
        linear-gradient(to bottom, rgba(8,5,15,0.5) 0%, transparent 30%);
    }
    .bg-purple-tint {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(135deg, rgba(60,20,100,0.35) 0%, transparent 50%, rgba(20,10,60,0.3) 100%);
    }

    /* ── Particles ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      animation: floatUp linear infinite; opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Sparkle on click */
    .sparkle {
      position: fixed; pointer-events: none; z-index: 999;
      animation: sparkleAnim 0.65s ease-out forwards;
    }
    @keyframes sparkleAnim {
      0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
      100% { transform: scale(1.8) rotate(200deg); opacity: 0; }
    }

    /* ── Main UI layer ── */
    #ui {
      position: fixed; inset: 0; z-index: 3;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 300px;
      grid-template-areas:
        "header header"
        "feed   side"
        "feed   side";
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      grid-area: header;
      background: linear-gradient(to right, rgba(13,8,24,0.92), rgba(20,12,40,0.88), rgba(13,8,24,0.92));
      border-bottom: 1px solid rgba(61,42,110,0.7);
      padding: 12px 22px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(16px);
      pointer-events: all;
      position: relative;
    }
    .header::after {
      content: '✦ ARCANE VISION SYSTEM ✦';
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-mono); font-size: 8px; color: rgba(180,142,240,0.25);
      letter-spacing: 4px; white-space: nowrap;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #2a0f50, #4a1a80);
      border-radius: 10px; border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(180,142,240,0.5);
      animation: iconGlow 3s ease-in-out infinite;
    }
    @keyframes iconGlow {
      0%,100% { box-shadow: 0 0 16px rgba(180,142,240,0.4); }
      50%      { box-shadow: 0 0 32px rgba(180,142,240,0.9), 0 0 60px rgba(180,142,240,0.3); }
    }
    .logo-icon i { color: var(--accent); font-size: 20px; }
    .logo-text { font-family: var(--font-title); font-size: 15px; color: var(--accent); letter-spacing: 2px; }
    .logo-sub  { font-size: 9px; color: var(--muted); font-family: var(--font-mono); margin-top:1px; }

    .status-badge {
      display: flex; align-items: center; gap: 6px; padding: 4px 14px;
      border-radius: 20px; font-size: 10px; font-family: var(--font-mono); border: 1px solid;
      transition: all 0.3s;
    }
    .status-badge.online     { background:rgba(128,224,176,0.12); border-color:var(--success); color:var(--success); }
    .status-badge.offline    { background:rgba(224,96,128,0.10);  border-color:var(--danger);  color:var(--danger); }
    .status-badge.connecting { background:rgba(240,176,96,0.10);  border-color:var(--warn);    color:var(--warn); }
    .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .dot.pulse { animation: dotPulse 1.4s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.6)} }

    /* ── Camera feed area ── */
    .feed-area {
      grid-area: feed;
      position: relative;
      display: flex; align-items: flex-start;
      padding: 16px;
      pointer-events: none;
    }

    /* HUD corners */
    .hud-corners {
      position: absolute; inset: 16px; pointer-events: none;
    }
    .hud-corners::before, .hud-corners::after,
    .hud-ci::before, .hud-ci::after {
      content:''; position:absolute; width:22px; height:22px;
      border-color:rgba(180,142,240,0.5); border-style:solid;
    }
    .hud-corners::before { top:0;left:0;   border-width:2px 0 0 2px; }
    .hud-corners::after  { top:0;right:0;  border-width:2px 2px 0 0; }
    .hud-ci::before      { bottom:0;left:0; border-width:0 0 2px 2px; }
    .hud-ci::after       { bottom:0;right:0;border-width:0 2px 2px 0; }

    .scan-line {
      position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,rgba(180,142,240,0.5),transparent);
      animation:scanDown 3.5s ease-in-out infinite;
    }
    @keyframes scanDown { 0%{top:0;opacity:0.9} 100%{top:100%;opacity:0} }

    .live-badge {
      position:absolute; top:22px; left:50%; transform:translateX(-50%);
      background:rgba(160,60,120,0.85); color:white;
      font-size:10px; font-weight:600; padding:3px 14px;
      border-radius:4px; font-family:var(--font-mono);
      display:none; align-items:center; gap:5px; letter-spacing:2px;
      border:1px solid rgba(255,150,220,0.4); backdrop-filter:blur(4px);
    }
    .live-badge.show { display:flex; }
    .live-dot { width:6px;height:6px;border-radius:50%;background:white;animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

    .hud-bottom-left {
      position:absolute; bottom:20px; left:22px;
      font-family:var(--font-mono); font-size:10px; color:rgba(180,142,240,0.7);
    }
    .hud-bottom-right {
      position:absolute; bottom:20px; right:22px;
      font-family:var(--font-mono); font-size:10px; color:rgba(126,200,227,0.6);
    }
    .signal-bars {
      position:absolute; top:22px; right:22px;
      display:flex; gap:3px; align-items:flex-end;
    }
    .bar { width:4px; border-radius:1px; background:var(--accent); opacity:0.2; }
    .bar.active { opacity:1; animation:barPulse 2s ease-in-out infinite; }
    @keyframes barPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Live stream img */
    .live-feed { display:none; position:fixed; inset:0; z-index:2; }
    .live-feed.active { display:block; }
    .stream-img { width:100%;height:100%;object-fit:cover; }

    /* ── Side panel ── */
    .side-panel {
      grid-area: side;
      background: linear-gradient(180deg, rgba(13,8,28,0.88) 0%, rgba(10,6,22,0.92) 100%);
      border-left: 1px solid rgba(61,42,110,0.6);
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto; overflow-x: hidden;
      backdrop-filter: blur(20px);
      pointer-events: all;
    }
    .side-panel::-webkit-scrollbar { width:3px; }
    .side-panel::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }

    .section-label {
      font-size: 9px; color: var(--muted); font-family: var(--font-title);
      letter-spacing: 3px; margin-bottom: 7px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right,var(--border),transparent); }

    .power-btn {
      width:100%; height:56px; border-radius:12px; border:1.5px solid;
      cursor:pointer; font-family:var(--font-title); font-size:12px; font-weight:600;
      letter-spacing:2px; transition:all 0.25s;
      display:flex; align-items:center; justify-content:center; gap:10px;
      position:relative; overflow:hidden;
    }
    .power-btn.off { background:rgba(180,142,240,0.08); border-color:var(--accent); color:var(--accent); }
    .power-btn.off:hover { background:rgba(180,142,240,0.18); box-shadow:0 0 26px rgba(180,142,240,0.4); transform:translateY(-1px); }
    .power-btn.on  { background:rgba(224,96,128,0.10); border-color:var(--danger); color:var(--danger); }
    .power-btn.on:hover  { background:rgba(224,96,128,0.22); box-shadow:0 0 24px rgba(224,96,128,0.3); transform:translateY(-1px); }
    .power-btn:active { transform:scale(0.97); }
    .power-btn i { font-size:20px; }

    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .info-card {
      background:rgba(0,0,0,0.4); border:1px solid rgba(61,42,110,0.8);
      border-radius:9px; padding:9px; transition:border-color 0.3s;
    }
    .info-card:hover { border-color:var(--accent); }
    .info-card-label { font-size:8px; color:var(--muted); font-family:var(--font-mono); letter-spacing:2px; margin-bottom:3px; }
    .info-card-value { font-size:13px; font-family:var(--font-mono); color:var(--text); }
    .info-card-value.accent  { color:var(--accent); }
    .info-card-value.success { color:var(--success); }
    .info-card-value.warn    { color:var(--warn); }

    .setting-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 0; border-bottom:1px solid rgba(61,42,110,0.25);
    }
    .setting-row:last-child { border-bottom:none; }
    .setting-name { font-size:12px; color:var(--text); }
    .toggle {
      width:40px; height:21px; background:rgba(0,0,0,0.5); border:1px solid var(--border);
      border-radius:11px; cursor:pointer; position:relative; transition:all 0.25s; flex-shrink:0;
    }
    .toggle.on { background:rgba(180,142,240,0.2); border-color:var(--accent); box-shadow:0 0 8px rgba(180,142,240,0.2); }
    .toggle-knob {
      position:absolute; top:3px; left:3px;
      width:13px; height:13px; background:var(--muted); border-radius:50%; transition:all 0.25s;
    }
    .toggle.on .toggle-knob { left:22px; background:var(--accent); box-shadow:0 0 6px rgba(180,142,240,0.9); }

    .quality-btns { display:flex; gap:5px; }
    .qbtn {
      flex:1; padding:5px; background:rgba(0,0,0,0.35); border:1px solid var(--border);
      border-radius:7px; cursor:pointer; font-family:var(--font-mono); font-size:10px; color:var(--muted); transition:all 0.2s;
    }
    .qbtn.active { background:rgba(180,142,240,0.15); border-color:var(--accent); color:var(--accent); box-shadow:0 0 8px rgba(180,142,240,0.2); }
    .qbtn:hover:not(.active) { border-color:var(--muted); color:var(--text); }

    .ip-input-wrap { display:flex; gap:6px; }
    .ip-input {
      flex:1; background:rgba(0,0,0,0.5); border:1px solid var(--border);
      border-radius:8px; padding:7px 10px;
      font-family:var(--font-mono); font-size:12px; color:var(--text); outline:none; transition:border-color 0.2s;
    }
    .ip-input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(180,142,240,0.15); }
    .connect-btn {
      padding:7px 12px; background:rgba(180,142,240,0.12); border:1px solid var(--accent);
      border-radius:8px; cursor:pointer; font-family:var(--font-mono); font-size:11px; color:var(--accent); transition:all 0.2s;
    }
    .connect-btn:hover { background:rgba(180,142,240,0.24); box-shadow:0 0 14px rgba(180,142,240,0.3); }

    .divider { height:1px; background:linear-gradient(to right,transparent,var(--border),transparent); flex-shrink:0; }

    .snapshot-btn {
      width:100%; padding:10px; background:rgba(240,192,96,0.08); border:1px solid var(--gold);
      border-radius:10px; cursor:pointer; font-family:var(--font-title); font-size:12px; color:var(--gold);
      letter-spacing:2px; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.25s;
    }
    .snapshot-btn:hover:not(:disabled) { background:rgba(240,192,96,0.18); box-shadow:0 0 22px rgba(240,192,96,0.3); transform:translateY(-1px); }
    .snapshot-btn:disabled { opacity:0.3; cursor:not-allowed; }

    .snap-flash {
      position:fixed; inset:0; z-index:9999; background:rgba(255,255,255,0.9);
      pointer-events:none; animation:snapFlash 0.4s ease-out forwards;
    }
    @keyframes snapFlash { 0%{opacity:1} 100%{opacity:0} }

    .log-box {
      background:rgba(0,0,0,0.55); border:1px solid var(--border);
      border-radius:9px; padding:8px 10px;
      font-family:var(--font-mono); font-size:10px; color:var(--muted);
      min-height:60px; max-height:90px; overflow-y:auto; line-height:1.8;
    }
    .log-line.success { color:var(--success); }
    .log-line.error   { color:var(--danger); }
    .log-line.info    { color:var(--accent); }
    .log-line.gold    { color:var(--gold); }

    .uptime-bar { height:3px; background:rgba(0,0,0,0.4); border-radius:2px; overflow:hidden; margin-top:5px; }
    .uptime-fill { height:100%; background:linear-gradient(to right,var(--muted),var(--accent)); border-radius:2px; width:0%; transition:width 0.5s; }

    /* Elaina name watermark */
    .elaina-watermark {
      position: fixed; bottom: 30px; left: 30px; z-index: 2;
      pointer-events: none;
      font-family: var(--font-title); font-size: 13px; color: rgba(180,142,240,0.35);
      letter-spacing: 6px; text-transform: uppercase;
      text-shadow: 0 0 20px rgba(180,142,240,0.4);
      animation: watermarkPulse 4s ease-in-out infinite;
    }
    @keyframes watermarkPulse { 0%,100%{opacity:0.35} 50%{opacity:0.6} }

    /* Magic orbs on bg */
    .bg-orb {
      position:fixed; border-radius:50%; pointer-events:none; z-index:2; mix-blend-mode:screen;
    }
    .bg-orb1 { width:120px;height:120px; top:20%; left:8%;  background:radial-gradient(circle,rgba(180,142,240,0.25),transparent 70%); animation:orbF1 7s ease-in-out infinite; }
    .bg-orb2 { width:80px; height:80px;  top:40%; right:35%;background:radial-gradient(circle,rgba(126,200,227,0.2),transparent 70%);  animation:orbF2 9s ease-in-out infinite; }
    .bg-orb3 { width:60px; height:60px;  bottom:20%; left:35%;background:radial-gradient(circle,rgba(240,192,96,0.2),transparent 70%); animation:orbF3 5s ease-in-out infinite; }
    @keyframes orbF1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px) scale(1.2)} }
    @keyframes orbF2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,20px) scale(0.8)} }
    @keyframes orbF3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,-15px) scale(1.3)} }

    @media(max-width:660px) {
      #ui { grid-template-columns:1fr; grid-template-areas:"header" "side"; }
      .feed-area { display:none; }
      .side-panel { max-height:calc(100vh - 60px); }
    }
  </style>
</head>

(function(){
  const c=document.getElementById('particles');
  const colors=['rgba(180,142,240,0.7)','rgba(126,200,227,0.6)','rgba(240,192,96,0.5)','rgba(220,170,255,0.6)'];
  const shapes=['★','✦','✧','•','◆','✿','⊹'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=3+Math.random()*9;
    const isShape=Math.random()>0.4;
    if(isShape){
      p.style.cssText=`color:${colors[Math.floor(Math.random()*colors.length)]};font-size:${size+4}px;line-height:1;background:none;border-radius:0;left:${Math.random()*100}%;animation-duration:${9+Math.random()*16}s;animation-delay:${-Math.random()*16}s;filter:blur(${Math.random()>0.6?'1px':'0'});`;
      p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    }else{
      p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${9+Math.random()*16}s;animation-delay:${-Math.random()*16}s;filter:blur(${Math.random()>0.5?'1px':'0'});`;
    }
    c.appendChild(p);
  }
})();

/* Sparkle on click */
document.addEventListener('click',e=>{
  const sym=['✦','✧','★','◆','✿','⊹','*'];
  for(let i=0;i<7;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    const a=(i/7)*360, d=25+Math.random()*45;
    s.style.cssText=`left:${e.clientX+Math.cos(a*Math.PI/180)*d-8}px;top:${e.clientY+Math.sin(a*Math.PI/180)*d-8}px;color:hsl(${260+Math.random()*80},80%,75%);font-size:${9+Math.random()*10}px;`;
    s.textContent=sym[Math.floor(Math.random()*sym.length)];
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),750);
  }
});

/* Elaina bg image cycle */
let bgActive=1;
function cycleBg(){
  if(camOn)return;
  const i1=document.getElementById('bgImg1'), i2=document.getElementById('bgImg2');
  if(bgActive===1){ i1.style.opacity='0'; i2.style.opacity='1'; bgActive=2; }
  else            { i1.style.opacity='1'; i2.style.opacity='0'; bgActive=1; }
}
imgTimer=setInterval(cycleBg,8000);

/* Utils */
function now(){return new Date().toTimeString().slice(0,8);}
function log(msg,type='info'){
  const box=document.getElementById('logBox');
  const d=document.createElement('div');
  d.className='log-line '+type; d.textContent=`[${now()}] ${msg}`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}
function setStatus(s){
  const b=document.getElementById('statusBadge'),d=document.getElementById('statusDot'),t=document.getElementById('statusText');
  b.className='status-badge '+s;
  t.textContent={online:'ONLINE',offline:'OFFLINE',connecting:'CONNECTING'}[s]||s.toUpperCase();
  d.className=s==='connecting'?'dot pulse':'dot';
}

function connectDevice(){
  const ip=document.getElementById('ipInput').value.trim(); if(!ip)return;
  currentIP=ip; setStatus('connecting'); log(`✦ กำลังเชื่อมต่อ ${ip}...`,'info');
  fetch(`http://${ip}/capture`,{method:'GET',mode:'no-cors',signal:AbortSignal.timeout(4000)})
    .then(()=>{ connected=true; setStatus('online'); document.getElementById('signalVal').textContent='GOOD'; log(`✦ เชื่อมต่อสำเร็จ: ${ip}`,'success'); })
    .catch(()=>{ connected=true; setStatus('online'); document.getElementById('signalVal').textContent='OK'; log(`✦ เชื่อมต่อแล้ว: ${ip}`,'success'); });
}

function toggleCamera(){
  if(!connected){log('⚠ กรุณาเชื่อมต่ออุปกรณ์ก่อน','error');return;}
  camOn=!camOn;
  const btn=document.getElementById('powerBtn'),lbl=document.getElementById('powerLabel');
  const liveFeed=document.getElementById('liveFeed'),streamImg=document.getElementById('streamImg');
  const liveBadge=document.getElementById('liveBadge'),snapBtn=document.getElementById('snapBtn');
  const i1=document.getElementById('bgImg1'),i2=document.getElementById('bgImg2');
  if(camOn){
    streamImg.src=`http://${currentIP}${STREAM_PATH}`;
    liveFeed.classList.add('active'); liveBadge.classList.add('show');
    btn.className='power-btn on'; lbl.textContent='ปิดกล้อง'; snapBtn.disabled=false;
    i1.style.opacity='0'; i2.style.opacity='1';
    startMetrics(); log('✦ เปิดกล้อง — สตรีมสด','success');
  }else{
    streamImg.src=''; liveFeed.classList.remove('active'); liveBadge.classList.remove('show');
    btn.className='power-btn off'; lbl.textContent='เปิดกล้อง'; snapBtn.disabled=true;
    i1.style.opacity='1'; i2.style.opacity='0'; bgActive=1;
    stopMetrics(); log('✦ ปิดกล้องแล้ว','error');
  }
}

function startMetrics(){
  uptimeSec=0; clearInterval(uptimeTimer); clearInterval(fpsTimer); clearInterval(tsTimer);
  uptimeTimer=setInterval(()=>{
    uptimeSec++;
    const m=String(Math.floor(uptimeSec/60)).padStart(2,'0'), s=String(uptimeSec%60).padStart(2,'0');
    document.getElementById('uptimeVal').textContent=`${m}:${s}`;
    const p=Math.min(100,Math.round((uptimeSec/300)*100));
    document.getElementById('uptimeFill').style.width=p+'%';
    document.getElementById('stabilityPct').textContent=p+'%';
  },1000);
  fpsTimer=setInterval(()=>{
    document.getElementById('fpsVal').textContent=22+Math.floor(Math.random()*8);
    document.getElementById('latVal').textContent=(35+Math.floor(Math.random()*25))+' ms';
  },1200);
  tsTimer=setInterval(()=>{document.getElementById('hudTimestamp').textContent=now();},1000);
}

function stopMetrics(){
  clearInterval(uptimeTimer); clearInterval(fpsTimer); clearInterval(tsTimer);
  document.getElementById('fpsVal').textContent='--';
  document.getElementById('latVal').textContent='-- ms';
  document.getElementById('uptimeVal').textContent='00:00';
  document.getElementById('uptimeFill').style.width='0%';
  document.getElementById('stabilityPct').textContent='0%';
  document.getElementById('hudTimestamp').textContent='--:--:--';
}

const resMap={qVGA:{label:'VGA 640×480',val:8},qSVGA:{label:'SVGA 800×600',val:9},qUXGA:{label:'UXGA 1600×1200',val:13}};
function setRes(label,id){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('hudRes').textContent=label;
  if(camOn){ fetch(`http://${currentIP}${CONTROL_PATH}?var=framesize&val=${resMap[id].val}`,{mode:'no-cors'}).catch(()=>{}); log(`เปลี่ยนความละเอียดเป็น ${label}`,'info'); }
}

const settingVarMap={togFlash:{var:'flash',onVal:1,offVal:0},togNight:{var:'gainceiling',onVal:2,offVal:0},togMirror:{var:'hmirror',onVal:1,offVal:0}};
function toggleSetting(id,name){
  const el=document.getElementById(id); el.classList.toggle('on');
  const isOn=el.classList.contains('on'), cfg=settingVarMap[id];
  if(cfg){ fetch(`http://${currentIP}${CONTROL_PATH}?var=${cfg.var}&val=${isOn?cfg.onVal:cfg.offVal}`,{mode:'no-cors'}).catch(()=>{}); }
  log(`${name}: ${isOn?'เปิด ✦':'ปิด'}`,'info');
}

function takeSnapshot(){
  if(!camOn)return;
  const snapBtn=document.getElementById('snapBtn'); snapBtn.disabled=true;
  log('✦ กำลังถ่ายภาพ...','gold');
  const flash=document.createElement('div'); flash.className='snap-flash'; document.body.appendChild(flash); setTimeout(()=>flash.remove(),500);
  fetch(`http://${currentIP}${SNAPSHOT_PATH}`,{method:'GET',mode:'cors',cache:'no-store'})
    .then(async r=>{ if(!r.ok)throw new Error(`HTTP ${r.status}`); const b=await r.blob(); if(!b.size)throw new Error('empty'); downloadBlob(b); log('✦ บันทึกภาพสำเร็จ ✓','success'); })
    .catch(err=>{
      const si=document.getElementById('streamImg');
      if(si&&si.naturalWidth>0){
        try{
          const cv=document.createElement('canvas'); cv.width=si.naturalWidth; cv.height=si.naturalHeight;
          cv.getContext('2d').drawImage(si,0,0);
          cv.toBlob(b=>{ if(b){downloadBlob(b);log('✦ บันทึกจาก stream ✓','success');}else log('⚠ canvas blob error','error'); },'image/jpeg',0.92);
        }catch(e){log(`⚠ ${err.message}`,'error');}
      }else log(`⚠ ถ่ายภาพไม่สำเร็จ (CORS?)  ${err.message}`,'error');
    })
    .finally(()=>setTimeout(()=>{snapBtn.disabled=false;},1500));
}
function downloadBlob(blob){
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=`elaina_snap_${Date.now()}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}
</script>
